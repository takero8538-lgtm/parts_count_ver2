<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>部品カウント</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#007ACC" />
  <script src="js/tf.min.js"></script>
</head>
<body>
  <h1>カウンター</h1>

  <div class="upload-area">
    <div class="file-input-wrapper">
      <div class="custom-file-btn">📁 画像を選ぶ</div>
      <input type="file" id="imageInput" accept="image/*" />
    </div>
    
    <button id="startCameraBtn">📸 カメラ起動</button>
    
    <button id="captureBtn" disabled>🎯 写真を撮る</button>

    <button id="runBtn" disabled>🚀 カウント開始</button>
  </div>

  <video id="video" autoplay playsinline style="display: none; width: 100%; max-width: 640px; background: #000; margin-bottom: 12px;"></video>

  <canvas id="canvas"></canvas>

  <div id="result"></div>

  <script src="js/app.js"></script>
</body>
</html>
