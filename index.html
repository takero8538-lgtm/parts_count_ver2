<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>数える君 AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#007ACC" />
  <script src="js/tf.min.js"></script>
  <style>
    /* シンプルなモーダル（ポップアップ）スタイル */
    #modelSelectModal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
    }
    #modelSelectContent {
      background-color: #fff;
      padding: 20px;
      border-radius: 6px;
      max-width: 320px;
      width: 90%;
      box-sizing: border-box;
    }
    #modelSelectContent h3 {
      margin-top: 0;
    }
    #modelList {
      list-style: none;
      padding-left: 0;
      margin-bottom: 12px;
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #modelList li {
      padding: 8px 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    #modelList li:hover {
      background-color: #e6f0ff;
    }
    #closeModalBtn {
      background-color: #007acc;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>数える君 AI - 複数モデル選択版</h1>

  <div class="upload-area">
    <div class="file-input-wrapper">
      <div class="custom-file-btn">📁 画像を選ぶ</div>
      <input type="file" id="imageInput" accept="image/*" />
    </div>
    
    <button id="startCameraBtn">📸 カメラ起動</button>
    
    <button id="captureBtn" disabled>🎯 写真を撮る</button>

    <button id="runBtn" disabled>🚀 カウント開始</button>
  </div>

  <div id="result" style="white-space: pre-line; margin-top: 12px;"></div>

  <video id="video" autoplay playsinline style="display: none; width: 100%; max-width: 640px; background: #000; margin: 12px 0;"></video>

  <canvas id="canvas" style="border:1px solid #ccc;"></canvas>

  <!-- モデル選択用モーダル -->
  <div id="modelSelectModal">
    <div id="modelSelectContent">
      <h3>部品名を選択してください</h3>
      <ul id="modelList"></ul>
      <button id="closeModalBtn">閉じる</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
